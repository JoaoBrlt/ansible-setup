---
dependency:
  name: galaxy

driver:
  name: docker

platforms:
  - name: fedora38
    image: geerlingguy/docker-fedora38-ansible:latest
    command: ""
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    cgroupns_mode: host
    privileged: true
    pre_build_image: true

provisioner:
  name: ansible

verifier:
  name: ansible
