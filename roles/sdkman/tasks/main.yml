---
- name: Update the repository cache
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600
  become: true

- name: Install the dependencies
  ansible.builtin.apt:
    name:
      - curl
      - tar
      - zip
      - unzip
    state: present
  become: true

- name: Check the installation directory
  ansible.builtin.stat:
    path: ~/.sdkman
  register: sdkman_install_dir

- name: Download the installation script
  ansible.builtin.get_url:
    url: https://get.sdkman.io
    dest: /tmp/install_sdkman.sh
    mode: "0700"
    checksum: sha256:60a725aac53e525def14d5e439daa5ea6f935b2d24dea0b4d2269da2325b10c1
  when: not sdkman_install_dir.stat.exists

- name: Install SDKMAN
  ansible.builtin.command: /bin/bash /tmp/install_sdkman.sh
  when: not sdkman_install_dir.stat.exists
  changed_when: true

- name: Install the Java versions
  ansible.builtin.include_tasks: install-java.yml
  loop: "{{ sdkman_java_versions }}"
