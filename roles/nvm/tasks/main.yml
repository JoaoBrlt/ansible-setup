---
- name: Update the repository cache
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600
  become: true

- name: Install the dependencies
  ansible.builtin.apt:
    name:
      - git
      - curl
  become: true

- name: Check the installation directory
  ansible.builtin.stat:
    path: ~/.nvm
  register: nvm_install_dir

- name: Download the installation script
  ansible.builtin.get_url:
    url: https://raw.githubusercontent.com/nvm-sh/nvm/v0.40.4/install.sh
    dest: /tmp/install_nvm.sh
    mode: "0700"
    checksum: sha256:4b7412c49960c7d31e8df72da90c1fb5b8cccb419ac99537b737028d497aba4f
  when: not nvm_install_dir.stat.exists

- name: Install NVM
  ansible.builtin.command: /bin/bash /tmp/install_nvm.sh
  when: not nvm_install_dir.stat.exists
  changed_when: true

- name: Synchronize the Node versions
  ansible.builtin.command: /bin/bash -ilc 'nvm ls-remote'
  changed_when: false

- name: Install the Node versions
  ansible.builtin.include_tasks: install-node.yml
  loop: "{{ nvm_node_versions }}"
