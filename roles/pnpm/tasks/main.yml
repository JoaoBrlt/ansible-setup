---
- name: Update the repository cache
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600
  become: true

- name: Install the dependencies
  ansible.builtin.apt:
    name:
      - curl
      - tar
      - unzip
  become: true

- name: Check the installation directory
  ansible.builtin.stat:
    path: ~/.local/share/pnpm
  register: pnpm_install_dir

- name: Download the installation script
  ansible.builtin.get_url:
    url: https://get.pnpm.io/install.sh
    dest: /tmp/install_pnpm.sh
    mode: "0700"
  when: not pnpm_install_dir.stat.exists

- name: Install pnpm
  ansible.builtin.command: /bin/sh /tmp/install_pnpm.sh
  when: not pnpm_install_dir.stat.exists
  changed_when: true

- name: Synchronize the Node versions
  ansible.builtin.command: /bin/bash -ilc 'pnpm env list --remote'
  changed_when: false

- name: Install the Node versions
  ansible.builtin.include_tasks: install-node.yml
  loop: "{{ pnpm_node_versions }}"
