---
- name: Development tools
  hosts: all
  roles:
    - setup

    - role: zsh
      zsh_default_shell: true

    - oh_my_zsh

    - powerlevel10k

    - role: nvm
      nvm_node_versions:
        - { version: 20 }
        - { version: 22, default: true }

    - role: sdkman
      sdkman_java_versions:
        - { version: 17 }
        - { version: 21, default: true }

    - maven
