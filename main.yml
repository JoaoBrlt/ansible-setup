---
- name: Set up the workstation
  hosts: all
  roles:
    # Prepare
    - debloat_ubuntu

    - prepare

    # Package managers
    - flatpak

    # Desktop environment
    - configure_gnome

    # Terminal
    - role: zsh
      zsh_default_shell: true

    - oh_my_zsh

    - powerlevel10k

    - guake

    # Virtualization tools
    - libvirt

    - virt_manager

    # Development tools
    - role: sdkman
      sdkman_java_versions:
        - { version: 21 }
        - { version: 25, default: true }

    - maven

    - role: pnpm
      pnpm_node_versions:
        - { version: 22 }
        - { version: 24, default: true }

    - docker

    - vagrant

    - vagrant_libvirt

    - packer

    - terraform

    - jetbrains_toolbox

    - gitkraken

    - postman

    # Applications
    - google_chrome

    - firefox

    - keepassxc

    - solaar

    - vlc

    - pinta

    - color_picker

    - signal

    - slack

    - discord

    # Clean up
    - cleanup
